<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Registration | Sattva Path Collective</title>
    <style>
      :root {
        --ink: #253027;
        --muted: #5f6d61;
        --paper: #fbf7ef;
        --soft: #f1eadc;
        --leaf: #486347;
        --gold: #b88442;
        --white: #fffdf8;
        --line: rgba(37, 48, 39, 0.16);
        --shadow: 0 20px 50px rgba(37, 48, 39, 0.14);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1.6;
      }

      .skip-link {
        position: absolute;
        left: 16px;
        top: 12px;
        z-index: 100;
        padding: 10px 14px;
        border-radius: var(--radius);
        background: var(--ink);
        color: var(--white);
        font-family: Arial, sans-serif;
        font-weight: 700;
        transform: translateY(-140%);
      }

      .skip-link:focus {
        transform: translateY(0);
      }

      :focus-visible {
        outline: 3px solid var(--gold);
        outline-offset: 3px;
      }

      .wrap {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
      }

      .header {
        border-bottom: 1px solid var(--line);
        background: rgba(251, 247, 239, 0.96);
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 68px;
      }

      a {
        color: inherit;
      }

      .brand {
        font-weight: 700;
        text-decoration: none;
      }

      .hero {
        padding: 56px 0 24px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--gold);
        font: 700 0.78rem Arial, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        max-width: 780px;
        font-size: clamp(2.2rem, 6vw, 4.6rem);
        line-height: 1.08;
      }

      h2 {
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        line-height: 1.1;
      }

      .lead {
        margin-top: 16px;
        color: var(--muted);
        font-size: 1.08rem;
      }

      .card {
        margin: 24px auto 72px;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--white);
        box-shadow: var(--shadow);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .pill {
        padding: 5px 8px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--leaf);
        font: 700 0.76rem Arial, sans-serif;
      }

      form {
        display: grid;
        gap: 16px;
        margin-top: 26px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font: 700 0.92rem Arial, sans-serif;
      }

      input,
      textarea {
        width: 100%;
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 10px 12px;
        background: #fffdf8;
        color: var(--ink);
        font: 0.96rem Arial, sans-serif;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      .speech-field {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: start;
      }

      .speech-field .speech-button {
        width: 46px;
        min-height: 46px;
        padding: 0;
        border-color: rgba(72, 99, 71, 0.45);
      }

      .speech-button svg {
        width: 20px;
        height: 20px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .speech-button[aria-pressed="true"] {
        background: var(--gold);
        color: var(--ink);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .button,
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 10px 16px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: var(--leaf);
        color: var(--white);
        cursor: pointer;
        font: 700 0.92rem Arial, sans-serif;
        text-decoration: none;
      }

      .button.secondary {
        background: transparent;
        border-color: rgba(72, 99, 71, 0.45);
        color: var(--leaf);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
        }
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .notice {
        margin-top: 18px;
        padding: 14px;
        border-radius: var(--radius);
        background: var(--soft);
        color: var(--muted);
        font-family: Arial, sans-serif;
      }

      .notice.error {
        border: 1px solid rgba(156, 107, 79, 0.45);
        background: rgba(156, 107, 79, 0.12);
        color: #6d3724;
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#registrationCard">Skip to registration form</a>
    <div class="sr-only" id="speechStatus" aria-live="polite"></div>
    <header class="header">
      <nav class="wrap nav">
        <a class="brand" href="index.html">Sattva Path Collective</a>
        <a class="button secondary" href="index.html#events">Back to Events</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="wrap" id="eventHeader"></div>
      </section>
      <section class="wrap card" id="registrationCard"></section>
    </main>

    <script>
      const eventId = new URLSearchParams(window.location.search).get("id");
      function getJson(key, fallback = []) {
        try {
          return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
        } catch {
          return fallback;
        }
      }

      function setJson(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      const events = getJson("sattva-events");
      const event = events.find((item) => item.id === eventId);
      const header = document.querySelector("#eventHeader");
      const card = document.querySelector("#registrationCard");
      const speechStatus = document.querySelector("#speechStatus");
      let activeRecognition = null;

      function setSpeechStatus(message) {
        if (speechStatus) speechStatus.textContent = message;
      }

      function enhanceSpeechFields(root = document) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        root.querySelectorAll("[data-speech]").forEach((field) => {
          if (field.dataset.speechReady === "true") return;
          field.dataset.speechReady = "true";
          const wrapper = document.createElement("div");
          wrapper.className = "speech-field";
          field.parentNode.insertBefore(wrapper, field);
          wrapper.appendChild(field);

          const button = document.createElement("button");
          button.className = "button secondary speech-button";
          button.type = "button";
          button.innerHTML = `
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
              <path d="M12 19v3"></path>
              <path d="M8 22h8"></path>
            </svg>
          `;
          button.setAttribute("aria-label", `Use voice input for ${field.getAttribute("aria-label") || field.id || "this field"}`);
          button.title = "Use voice input";
          button.setAttribute("aria-pressed", "false");

          if (!SpeechRecognition) {
            button.disabled = true;
            button.title = "Voice input is unavailable in this browser";
            wrapper.appendChild(button);
            return;
          }

          button.addEventListener("click", () => {
            if (activeRecognition) {
              activeRecognition.stop();
              activeRecognition = null;
            }

            const recognition = new SpeechRecognition();
            activeRecognition = recognition;
            recognition.lang = "en-US";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            button.setAttribute("aria-pressed", "true");
            setSpeechStatus("Listening. Speak now.");

            recognition.onresult = (event) => {
              const transcript = event.results[0][0].transcript.trim();
              const separator = field.value && field.tagName === "TEXTAREA" ? " " : "";
              field.value = `${field.value}${separator}${transcript}`.trim();
              field.dispatchEvent(new Event("input", { bubbles: true }));
              setSpeechStatus("Speech added to the field.");
            };

            recognition.onerror = () => {
              setSpeechStatus("Voice input did not work. You can type or try again.");
            };

            recognition.onend = () => {
              button.setAttribute("aria-pressed", "false");
              if (activeRecognition === recognition) activeRecognition = null;
            };

            recognition.start();
          });

          wrapper.appendChild(button);
        });
      }

      function inputFor(field) {
        const id = `field-${field.replace(/[^a-z0-9]/gi, "-").toLowerCase()}`;
        const longField = /notes|considerations|contact|agreement|acknowledgment/i.test(field);
        const type = /email/i.test(field) ? "email" : /phone|tel/i.test(field) ? "tel" : "text";
        const autocomplete = /email/i.test(field) ? " autocomplete=\"email\"" : /phone|tel/i.test(field) ? " autocomplete=\"tel\"" : /name/i.test(field) ? " autocomplete=\"name\"" : "";
        return `
          <div>
            <label for="${id}">${field}</label>
            ${longField ? `<textarea id="${id}" name="${field}" data-speech required></textarea>` : `<input id="${id}" name="${field}" type="${type}"${autocomplete} data-speech required>`}
          </div>
        `;
      }

      if (!event) {
        header.innerHTML = `
          <p class="eyebrow">Registration</p>
          <h1>Event not found</h1>
          <p class="lead">This event may have been deleted or is not available in this browser.</p>
        `;
        card.innerHTML = `<a class="button" href="index.html#events">Return to Events</a>`;
      } else {
        header.innerHTML = `
          <p class="eyebrow">${event.type} registration</p>
          <h1>${event.title}</h1>
          <p class="lead">${event.description}</p>
          <div class="meta">
            <span class="pill">${event.date}</span>
            <span class="pill">${event.location}</span>
            ${event.price ? `<span class="pill">${event.price}</span>` : ""}
            ${event.age ? `<span class="pill">${event.age}</span>` : ""}
          </div>
        `;

        card.innerHTML = `
          <p class="eyebrow">Registration form</p>
          <h2>Share your details</h2>
          <form id="dynamicRegistration">
            ${(event.fields || ["Full name", "Email", "Phone number"]).map(inputFor).join("")}
            <div class="actions">
              <button type="submit">Submit Registration</button>
              <a class="button secondary" href="index.html#events">Cancel</a>
            </div>
          </form>
          <div class="notice" id="doneMessage" hidden>
            Thank you. Your registration has been saved in this prototype.
          </div>
          <div class="notice error" id="errorMessage" role="alert" hidden>
            Your registration could not be saved in this browser. Please try again or contact the host.
          </div>
        `;

        document.querySelector("#dynamicRegistration").addEventListener("submit", (submitEvent) => {
          submitEvent.preventDefault();
          if (!submitEvent.currentTarget.checkValidity()) {
            submitEvent.currentTarget.reportValidity();
            return;
          }
          const formData = new FormData(submitEvent.currentTarget);
          const registrations = getJson("sattva-registrations");
          try {
            registrations.push({
              id: crypto.randomUUID(),
              eventId: event.id,
              eventTitle: event.title,
              createdAt: new Date().toISOString(),
              answers: Object.fromEntries(formData.entries())
            });
            setJson("sattva-registrations", registrations);
            submitEvent.currentTarget.reset();
            document.querySelector("#errorMessage").hidden = true;
            document.querySelector("#doneMessage").hidden = false;
          } catch {
            document.querySelector("#doneMessage").hidden = true;
            document.querySelector("#errorMessage").hidden = false;
          }
        });

        enhanceSpeechFields(card);
      }
    </script>
  </body>
</html>
